databases:
  - name: aiquiz-db
    databaseName: aiquiz
    user: aiquiz

services:
  - type: web
    name: aiquiz-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aiquiz-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: ALLOWED_HOSTS
        value: aiquiz-backend.onrender.com
      # You need to manually add GROQ_API_KEY in the Render dashboard
